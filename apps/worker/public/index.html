<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Re:Earth Buildings — viewer</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cesium@1.141/Build/Cesium/Widgets/widgets.css" />
<style>
  html, body, #app { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
  .overlay {
    position: absolute; background: rgba(20, 22, 28, 0.92); color: #fff;
    padding: 10px 12px; border-radius: 8px;
    font: 12px/1.45 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  /* Cesium's credit display sits along the very bottom; lift the
     status panel above it so the two don't collide. */
  #status { bottom: 36px; left: 12px; max-width: 360px; }
  #status .row { margin-top: 2px; color: #cfd6e0; }
  #status .err { color: #ff8e8e; }
  #status .pill { display: inline-block; min-width: 30px; padding: 1px 6px; margin-right: 6px;
                  background: #2a2f3a; border-radius: 99px; text-align: center; }
  #toggle { top: 12px; left: 12px; display: flex; gap: 6px; align-items: center; }
  #toggle .title { font-size: 13px; font-weight: 600; letter-spacing: 0.2px; margin-right: 8px; }
  #toggle .title a { color: #fff; text-decoration: none; }
  #toggle .title a:hover { text-decoration: underline; }
  #toggle button {
    background: #2a2f3a; color: #fff; border: 1px solid #404652;
    padding: 5px 10px; border-radius: 6px; font: inherit; cursor: pointer;
  }
  #toggle button.active { background: #3a82e0; border-color: #3a82e0; }
  #toggle button[disabled] { opacity: 0.5; cursor: not-allowed; }
  #toggle .note { color: #8b95a4; font-size: 11px; }
  #toggle .sep { color: #404652; }
  #toggle .label { color: #8b95a4; font-size: 11px; margin: 0 4px 0 4px; }
</style>
</head>
<body>
<div id="app"></div>
<div id="status" class="overlay">
  <div><span class="pill" id="loaded">0</span>tiles loaded</div>
  <div><span class="pill" id="failed">0</span>tiles failed</div>
  <div class="row" id="last-error"></div>
</div>
<div id="toggle" class="overlay">
  <span class="title"><a href="/">Re:Earth Buildings</a></span>
  <button id="btn-ours" class="active" type="button">ours</button>
  <button id="btn-cesium" type="button">Cesium OSM</button>
  <span class="sep">|</span>
  <span class="label">terrain</span>
  <button id="btn-terrain-re" class="active" type="button">Re:Earth</button>
  <button id="btn-terrain-cwt" type="button">Cesium</button>
  <button id="btn-terrain-off" type="button">off</button>
  <span class="note" id="toggle-note"></span>
</div>
<script type="module">
  import * as Cesium from "https://cdn.jsdelivr.net/npm/cesium@1.141/Build/Cesium/index.js";

  window.CESIUM_BASE_URL = "https://cdn.jsdelivr.net/npm/cesium@1.141/Build/Cesium/";

  const params = new URLSearchParams(location.search);
  const lon = Number(params.get("lon") ?? 139.7649);
  const lat = Number(params.get("lat") ?? 35.6785);
  const height = Number(params.get("height") ?? 1500);
  const heading = Number(params.get("heading") ?? 0);
  const pitch = Number(params.get("pitch") ?? -30);
  const debug = params.get("debug") === "1";
  const sse = Number(params.get("sse") ?? 16);
  // Custom Cesium Ion token (for the OSM Buildings comparison toggle).
  // The SDK ships with a default token suitable for dev evaluation but
  // it has lower rate limits; supply your own via ?ion=... for stable
  // testing.
  const ionToken = params.get("ion");
  if (ionToken) Cesium.Ion.defaultAccessToken = ionToken;

  // Re:Earth Terrain quantized-mesh — fetched up-front so the first
  // camera render already has terrain. Failure is non-fatal (the viewer
  // falls back to the bare ellipsoid).
  let initialTerrain;
  try {
    initialTerrain = await Cesium.CesiumTerrainProvider.fromUrl(
      "https://terrain.reearth.land/cesium-mesh/ellipsoid",
      { requestVertexNormals: true, requestWaterMask: false },
    );
  } catch (err) {
    console.warn("initial Re:Earth Terrain load failed", err);
  }

  const viewer = new Cesium.Viewer("app", {
    baseLayer: Cesium.ImageryLayer.fromProviderAsync(
      Promise.resolve(new Cesium.OpenStreetMapImageryProvider({ url: "https://tile.openstreetmap.org/" })),
    ),
    terrain: initialTerrain ? new Cesium.Terrain(Promise.resolve(initialTerrain)) : undefined,
    baseLayerPicker: false, geocoder: false, homeButton: false,
    sceneModePicker: false, navigationHelpButton: false,
    timeline: false, animation: false, fullscreenButton: false,
    skyBox: undefined,        // Cesium's default starfield SkyBox
    skyAtmosphere: undefined, // Cesium's default sky/atmosphere shader
    // requestRenderMode → only render when something actually changes
    // (camera, time, tiles loaded, …). With our fixed clock and the
    // terrain/buildings tilesets there's no need for a 60 fps draw
    // loop; this drops idle GPU usage to ~0.
    requestRenderMode: true,
    // We pin the clock manually for deterministic shadows; suppress
    // time-driven re-renders by making the threshold infinite.
    maximumRenderTimeChange: Infinity,
  });

  // Sun-tracking globe lighting (otherwise side walls go black when the
  // sun's dot product with the normal is ~0).
  viewer.scene.globe.enableLighting = true;
  // Depth-test against terrain → anything geometrically below the
  // terrain surface (building bases dropped under ground by min_height,
  // tile content from a lower-altitude pass, etc.) is occluded by the
  // globe rather than showing through. Also stops the camera from
  // looking "into" the planet from underground.
  viewer.scene.globe.depthTestAgainstTerrain = true;
  // Make the planet appear solid when the camera does end up below
  // terrain — instead of seeing the ground from underneath, the globe
  // renders as opaque black so underground content stays hidden.
  viewer.scene.globe.undergroundColor = Cesium.Color.BLACK;
  viewer.scene.globe.undergroundColorAlphaByDistance = new Cesium.NearFarScalar(
    0.0,
    1.0,
    1.0,
    1.0,
  );
  // Atmosphere & sky polish.
  viewer.scene.skyAtmosphere.show = true;
  if (viewer.scene.skyBox) viewer.scene.skyBox.show = true;
  if (viewer.scene.sun) viewer.scene.sun.show = true;
  if (viewer.scene.moon) viewer.scene.moon.show = true;
  // Cesium's "fast approximate" atmosphere is on by default; fog adds
  // distance falloff that makes the city feel less paper-flat.
  viewer.scene.fog.enabled = true;
  viewer.scene.fog.density = 1e-4;
  // Shadows from the sun on the globe AND on the building tileset.
  viewer.shadows = true;
  viewer.scene.globe.shadows = Cesium.ShadowMode.RECEIVE_ONLY;
  // Soft shadow filtering — single-tap point-source shadows look harsh.
  viewer.shadowMap.softShadows = true;
  viewer.shadowMap.size = 2048;
  // Pin a daytime clock so shadows are visible regardless of when the
  // page loads (without this, midnight UTC looks completely lit by
  // the moon term and there are no useful shadows).
  viewer.clock.currentTime = Cesium.JulianDate.fromIso8601("2024-06-21T03:00:00Z");

  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(lon, lat, height),
    orientation: {
      heading: Cesium.Math.toRadians(heading),
      pitch: Cesium.Math.toRadians(pitch),
      roll: 0,
    },
  });

  const loadedEl = document.getElementById("loaded");
  const failedEl = document.getElementById("failed");
  const lastErrorEl = document.getElementById("last-error");
  let loaded = 0, failed = 0;

  const tileset = await Cesium.Cesium3DTileset.fromUrl("/tileset.json", {
    maximumScreenSpaceError: sse,
    debugShowBoundingVolume: debug,
    // Hint that asset.copyright should also reach the on-screen credit
    // bar. In practice newer Cesium ignores this for 3D Tilesets and
    // routes the credit through the lightbox regardless — the
    // addStaticCredit(false) below is what currently surfaces it. Kept
    // as a forward-compat hint in case the upstream behaviour changes.
    showCreditsOnScreen: true,
  });
  tileset.shadows = Cesium.ShadowMode.ENABLED;
  viewer.scene.primitives.add(tileset);
  // Re-add tileset.json's asset.copyright into the "Data attribution"
  // lightbox only (showOnScreen=false). Cesium's tileset path tends to
  // surface the credit briefly during load and then drop it; this keeps
  // it permanently parked in the modal without cluttering the inline
  // bar (which already shows Re:Earth Terrain etc.). Worker stays the
  // single source of truth.
  fetch("/tileset.json")
    .then((r) => r.json())
    .then((t) => {
      const cp = t?.asset?.copyright;
      if (cp) viewer.creditDisplay.addStaticCredit(new Cesium.Credit(cp, false));
    })
    .catch((err) => console.warn("attribution fetch failed", err));
  // Expose for debugging via DevTools console.
  window.viewer = viewer;
  window.tileset = tileset;
  window.Cesium = Cesium;

  tileset.tileLoad.addEventListener(() => {
    loaded++;
    loadedEl.textContent = String(loaded);
  });
  tileset.tileFailed.addEventListener((event) => {
    const url = event.url ?? "(unknown)";
    const msg = event.message ?? "(no message)";
    // 404s are expected — Overture's PMTiles is sparse, so output tiles
    // covering pure water / wilderness legitimately have no content.
    // Don't surface them as failures.
    const is404 = /\b404\b/.test(msg) || /\b404\b/.test(url);
    if (is404) return;
    failed++;
    failedEl.textContent = String(failed);
    lastErrorEl.innerHTML = '<span class="err">' + url + '<br/>' + msg + '</span>';
    console.error("tile failed:", url, msg);
  });

  // ----- Cesium OSM Buildings comparison toggle -----
  // Lazy: only fetch Cesium OSM Buildings on first click. Falls back to
  // a "Cesium Ion needed" hint when the request 401s, so the dev page
  // still works without a configured token.
  const btnOurs = document.getElementById("btn-ours");
  const btnCesium = document.getElementById("btn-cesium");
  const toggleNote = document.getElementById("toggle-note");
  let cesiumOsm = null;
  let cesiumOsmLoading = null;

  function setActive(which) {
    btnOurs.classList.toggle("active", which === "ours");
    btnCesium.classList.toggle("active", which === "cesium");
    tileset.show = which === "ours";
    if (cesiumOsm) cesiumOsm.show = which === "cesium";
  }

  async function ensureCesiumOsm() {
    if (cesiumOsm) return cesiumOsm;
    if (cesiumOsmLoading) return cesiumOsmLoading;
    btnCesium.disabled = true;
    toggleNote.textContent = "loading Cesium OSM Buildings…";
    cesiumOsmLoading = Cesium.createOsmBuildingsAsync()
      .then((t) => {
        cesiumOsm = t;
        cesiumOsm.show = false;
        viewer.scene.primitives.add(cesiumOsm);
        toggleNote.textContent = "";
        return cesiumOsm;
      })
      .catch((err) => {
        console.error("Cesium OSM Buildings load failed", err);
        toggleNote.textContent = 'needs Ion token: ?ion=...';
        return null;
      })
      .finally(() => {
        btnCesium.disabled = false;
        cesiumOsmLoading = null;
      });
    return cesiumOsmLoading;
  }

  btnOurs.addEventListener("click", () => setActive("ours"));
  btnCesium.addEventListener("click", async () => {
    const loaded = await ensureCesiumOsm();
    if (loaded) setActive("cesium");
  });

  // ----- Terrain switcher (Re:Earth ↔ Cesium World Terrain ↔ off) -----
  // Buildings have ground elevation baked in (sampled from Re:Earth
  // Terrain at render time). Re:Earth = ground meets the building
  // bases cleanly. CWT = different vertical reference (Cesium uses
  // ellipsoidal heights too but the source DEM differs); some offset
  // is expected. Off = buildings sit above a flat ellipsoid.
  const btnReTerrain = document.getElementById("btn-terrain-re");
  const btnCwt = document.getElementById("btn-terrain-cwt");
  const btnOffTerrain = document.getElementById("btn-terrain-off");
  let reTerrain = initialTerrain ?? null;
  let cwtTerrain = null;
  // Track current terrain mode so the active button stays in sync even
  // when a load fails.
  let terrainMode = initialTerrain ? "re" : "off";
  function setTerrainButtons(active) {
    btnReTerrain.classList.toggle("active", active === "re");
    btnCwt.classList.toggle("active", active === "cwt");
    btnOffTerrain.classList.toggle("active", active === "off");
  }
  setTerrainButtons(terrainMode);

  async function switchTerrain(target) {
    if (terrainMode === target) return;
    btnReTerrain.disabled = btnCwt.disabled = btnOffTerrain.disabled = true;
    try {
      if (target === "re") {
        if (!reTerrain) {
          reTerrain = await Cesium.CesiumTerrainProvider.fromUrl(
            "https://terrain.reearth.land/cesium-mesh/ellipsoid",
            { requestVertexNormals: true, requestWaterMask: false },
          );
        }
        viewer.scene.setTerrain(new Cesium.Terrain(Promise.resolve(reTerrain)));
      } else if (target === "cwt") {
        if (!cwtTerrain) cwtTerrain = await Cesium.createWorldTerrainAsync();
        viewer.scene.setTerrain(new Cesium.Terrain(Promise.resolve(cwtTerrain)));
      } else {
        viewer.scene.setTerrain(
          new Cesium.Terrain(Promise.resolve(new Cesium.EllipsoidTerrainProvider())),
        );
      }
      terrainMode = target;
      setTerrainButtons(terrainMode);
      toggleNote.textContent = "";
    } catch (err) {
      console.error("terrain switch failed", err);
      toggleNote.textContent = target === "cwt" ? "Cesium terrain needs Ion token: ?ion=..." : "terrain load failed";
    } finally {
      btnReTerrain.disabled = btnCwt.disabled = btnOffTerrain.disabled = false;
    }
  }
  btnReTerrain.addEventListener("click", () => switchTerrain("re"));
  btnCwt.addEventListener("click", () => switchTerrain("cwt"));
  btnOffTerrain.addEventListener("click", () => switchTerrain("off"));

  // Feature attributes show up in Cesium's built-in InfoBox; the
  // EXT_structural_metadata path produces the same getProperty()
  // surface as the older b3dm batch table, so the InfoBox renders
  // them automatically for both ours and the Cesium OSM tileset.
</script>
</body>
</html>
