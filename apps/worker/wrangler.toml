name = "reearth-buildings-worker"
main = "src/index.ts"
compatibility_date = "2025-05-01"
workers_dev = true

# wasm-pack --target bundler emits an ES module wrapper + .wasm asset; wrangler
# bundles them. Run `pnpm build:wasm` before `wrangler dev` / `deploy` (the
# package.json scripts chain them automatically).

[vars]
# PMTILES_VERSION pins the upstream Protomaps build date (YYYYMMDD). Leave
# unset to let the worker auto-discover the latest build via KV-cached
# HEAD probes. Pinning is handy for reproducible dev / staging sessions.
PMTILES_VERSION = "20260513"

[[r2_buckets]]
binding = "SOURCES"
bucket_name = "reearth-buildings-sources-dev"

[[r2_buckets]]
binding = "CACHE"
bucket_name = "reearth-buildings-cache-dev"

[[kv_namespaces]]
binding = "PMTILES_DIR"
id = "REPLACE_WITH_DEV_KV_ID"

# ----- environments -----

[env.staging]
name = "reearth-buildings-worker-staging"
workers_dev = false
routes = [{ pattern = "staging-buildings.reearth.land", custom_domain = true }]

[env.staging.vars]
# staging auto-discovers latest upstream — leave PMTILES_VERSION unset.

[[env.staging.r2_buckets]]
binding = "SOURCES"
bucket_name = "reearth-buildings-sources"

[[env.staging.r2_buckets]]
binding = "CACHE"
bucket_name = "reearth-buildings-cache-staging"

[[env.staging.kv_namespaces]]
binding = "PMTILES_DIR"
id = "REPLACE_WITH_STAGING_KV_ID"

[env.prod]
name = "reearth-buildings-worker-prod"
workers_dev = false
routes = [{ pattern = "buildings.reearth.land", custom_domain = true }]

[env.prod.vars]
# prod auto-discovers latest upstream — leave PMTILES_VERSION unset.

[[env.prod.r2_buckets]]
binding = "SOURCES"
bucket_name = "reearth-buildings-sources"

[[env.prod.r2_buckets]]
binding = "CACHE"
bucket_name = "reearth-buildings-cache-prod"

[[env.prod.kv_namespaces]]
binding = "PMTILES_DIR"
id = "REPLACE_WITH_PROD_KV_ID"
