name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel in-flight runs of the same branch/PR — pushes during a build are
# common and the second one supersedes the first.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

# Third-party actions are pinned to a full commit SHA (with the human-readable
# tag in a trailing comment) so a moving tag can't silently swap the code we
# run. Bump the SHA + comment together when updating. dtolnay/rust-toolchain
# ships no semver releases — its @stable ref is a moving branch — so it's
# pinned to a master commit and the toolchain is passed explicitly via the
# `toolchain:` input (the @ref signal is lost once pinned to a SHA).
jobs:
  rust-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable (2026-06-20)
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable (2026-06-20)
        with:
          toolchain: stable
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable (2026-06-20)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace

  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable (2026-06-20)
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: wasm
          cache-targets: true
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - working-directory: crates/buildings-wasm
        run: wasm-pack build --target bundler --release

  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable (2026-06-20)
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: wasm
          cache-targets: true
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:wasm
      - run: pnpm lint
      - run: pnpm typecheck
      # wrangler deploy --dry-run doubles as a bundle-size / config sanity
      # check; it fails the build on missing bindings, oversized payload,
      # or syntax errors the typecheck wouldn't catch.
      - run: pnpm exec wrangler deploy --dry-run --outdir=dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || 'dry-run-noop' }}

  deploy:
    name: Deploy (Cloudflare Workers)
    needs: [rust-fmt, rust-clippy, rust-test, wasm-build, ts]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # Use a GitHub Environment so the CLOUDFLARE_API_TOKEN can be scoped
    # to main-branch deploys and (optionally) gated by required reviewers.
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable (2026-06-20)
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      # Reuse the same cache key as the build jobs so deploy can pick up
      # warm artifacts from the PR/main build that just passed.
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: wasm
          cache-targets: true

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - run: pnpm install --frozen-lockfile

      - name: Build WASM
        run: pnpm build:wasm

      # wrangler.toml pins account_id and the R2 bucket name, so the only
      # thing CI needs to supply is the API token.
      - name: Wrangler deploy
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
