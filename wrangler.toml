name = "reearth-buildings"
main = "src/index.ts"
compatibility_date = "2025-05-01"
workers_dev = false
routes = [{ pattern = "buildings.reearth.land", custom_domain = true }]

# Static assets bound to /. The Cesium viewer (public/index.html) is
# served directly without invoking the Worker; non-matching paths fall
# through to the Worker (tileset.json, glb tiles, healthz, …).
[assets]
directory = "./public"

# wasm-pack --target bundler emits an ES module wrapper + .wasm asset; wrangler
# bundles them. Run `pnpm build:wasm` before `wrangler dev` / `deploy` (the
# package.json scripts chain them automatically).

[vars]
# CACHE_DISABLED bypasses the R2 glb cache and emits `Cache-Control:
# no-store` on every response. Local dev overrides via `.dev.vars`.
CACHE_DISABLED = ""

[[r2_buckets]]
binding = "CACHE"
bucket_name = "reearth-buildings"

# Dense central-Tokyo tiles at z=12 blow past the default 50 ms CPU
# budget (Cloudflare error 1102). Workers Paid permits up to 30 s; set
# the ceiling explicitly so the worker can spend it on the heaviest tiles.
[limits]
cpu_ms = 30000
