# Candidate B: conservative — small-step tweaks driven by Chiyoda eval.
# Keeps the residential/low-rise table intact; only nudges the levers
# whose bias was clearly negative in the baseline:
#   - meters_per_floor: 3.0 → 3.3 (commercial floors are taller, but
#     residential 2.7-3.0; 3.3 is a compromise that won't blow up
#     low-rise apartments the way 3.5 did in candidate-tall-cbd)
#   - class=office / commercial: 30 → 40 (still too low for CBD towers
#     but won't overshoot suburban offices)
#   - class=hotel: 25 → 35
#   - footprint.dense_urban 200-800 m²: 18 → 21

meters_per_floor = 3.3

