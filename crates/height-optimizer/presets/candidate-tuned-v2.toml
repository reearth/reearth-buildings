# Candidate C: cross-city tuned (v2).
#
# Drives:
#   - chiyoda density bias was -8.6m  (CBD too low)
#   - tsukuba density bias was +6.3m  (suburb too high)
#   - iiyama  density bias was +7.8m  (small town misclassified as suburban)
#
# Levers (all configurable via TOML — no code changes):
#   1. meters_per_floor 3.0 → 3.3 (commercial floors compromise)
#   2. urban_thresholds.suburban_min 200 → 500 — small mountain towns
#      with ~200-500 buildings per source tile become Rural, dropping
#      from Suburban's 6-9-10 m table to Rural's 4-6-9-10.
#   3. footprint.dense_urban: bump every bucket so Chiyoda CBD towers
#      get a more realistic floor-area-derived height.
#   4. footprint.suburban: trim the 800+ m² catch-all from 10 → 8.
#   5. class.office / commercial / hotel bumped for CBD; retail kept
#      low; everything residential left alone.

meters_per_floor = 3.3

[urban_thresholds]
dense_urban_min = 1500.0
urban_min = 800.0
suburban_min = 500.0   # ← 200 → 500

