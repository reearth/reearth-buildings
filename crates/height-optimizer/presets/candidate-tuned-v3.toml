# Candidate D (v3): minimal-touch tweaks.
#
# v2 taught us: bumping dense_urban table backfires because not only
# Marunouchi but ANY tile-dense neighbourhood (Iiyama centre, Tsukuba
# centre) gets classified DenseUrban. We can't surgically target
# "actual CBD" with a global density table.
#
# v3 keeps the footprint table almost untouched and only:
#   1. meters_per_floor 3.0 → 3.3 (consistently helps num_floors slice)
#   2. class.office 30 → 40 (modest CBD bump that won't blow up
#      suburban offices the way 60 did)
#   3. class.hotel 25 → 35 (chiyoda has 8 hotels @ -36 bias)
#   4. dense_urban catch-all (>800 m²) 15 → 24 — targets ONLY large
#      CBD lots; small dense-tile features (Iiyama houses) don't hit
#      this bucket.

meters_per_floor = 3.3

[urban_thresholds]
dense_urban_min = 1500.0
urban_min = 800.0
